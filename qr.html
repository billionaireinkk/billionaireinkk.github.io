<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BillionaireInkk QR Code</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#000;font-family:'Georgia',serif;color:#faf8f1;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.wrap{text-align:center;padding:3rem 2rem;}
.brand{font-size:20px;letter-spacing:0.22em;text-transform:uppercase;color:#faf8f1;margin-bottom:4px;}
.sub{font-size:10px;letter-spacing:0.18em;color:#a09890;text-transform:uppercase;margin-bottom:2rem;}
.qr-wrap{background:#faf8f1;padding:1.5rem;display:inline-block;margin-bottom:2rem;}
.qr-wrap img{width:220px;height:220px;display:block;}
.url{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:#a09890;}
.divider{width:40px;height:0.5px;background:#a09890;margin:1.5rem auto;}
.hint{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:#a09890;line-height:1.8;}
</style>
</head>
<body>
<div class="wrap">
  <p class="brand">BillionaireInkk</p>
  <p class="sub">Atlanta, Georgia · Tattoo Artist</p>
  <div class="qr-wrap">
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=https://billionaireinkk.github.io&color=000000&bgcolor=faf8f1" alt="QR Code for billionaireinkk.github.io"/>
  </div>
  <div class="divider"></div>
  <p class="url">billionaireinkk.github.io</p>
  <div class="divider"></div>
  <p class="hint">Scan to book · browse · shop aftercare</p>
</div>
</body>
</html>
